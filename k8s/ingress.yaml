apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: production
  annotations:
    # Configure Application Load Balancer parameters
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    
    # Listen only on standard HTTP port 80 (avoids ACM SSL requirements)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    
    # Core ingress scaling limits
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout=60
spec:
  ingressClassName: alb # Standard ingress class definition
  rules:
    - http:
        paths:
          # Route all HTTP traffic directly to our ClusterIP service
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
