apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: production
  annotations:
    # Set ALB Ingress controller class
    kubernetes.io/ingress.class: alb
    
    # Configure Application Load Balancer parameters
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    
    # SSL and ACM Certificates (HTTPS implementation)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    
    # Replace with your actual AWS ACM Certificate ARN
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-west-2:123456789012:certificate/placeholder-acm-arn-id-here
    
    # Core ingress scaling limits
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout=60
spec:
  rules:
    - host: portfolio.example.com # Replace with your production domain name
      http:
        paths:
          # Match port 80 to HTTPS redirect action defined above
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: ssl-redirect
                port:
                  name: use-annotation
          # Route HTTPS traffic directly to our ClusterIP service
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
