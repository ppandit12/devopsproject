apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-network-policy
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    # 1. Allow ingress from AWS Load Balancer Controller
    - from:
        - namespaceSelector:
            matchLabels:
              elbv2.k8s.aws/pod-readiness-gate-injector: "enabled"
      ports:
        - protocol: TCP
          port: 8080
    # 2. Allow ingress from specific system monitoring scrape namespaces (Prometheus)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
